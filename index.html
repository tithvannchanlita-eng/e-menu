<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>E-Menu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: {
                50: '#f5f7ff',
                500: '#4f46e5',
                600: '#4338ca',
              },
            },
            boxShadow: {
              soft: '0 8px 30px rgba(15, 23, 42, 0.08)',
            },
          },
        },
      };
    </script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  </head>
  <body class="bg-slate-50 text-slate-900">
    <div id="app" class="mx-auto min-h-screen w-full max-w-3xl px-4 pb-8 pt-4 sm:px-6">
      <header class="sticky top-0 z-20 -mx-2 rounded-2xl bg-slate-50/90 px-2 py-3 backdrop-blur">
        <p class="text-xs font-semibold uppercase tracking-[0.2em] text-slate-500">Digital Menu</p>
        <h1 class="mt-1 text-3xl font-bold tracking-tight">{{ restaurant.name }}</h1>
        <p class="mt-1 text-sm text-slate-600">{{ restaurant.tagline }}</p>
      </header>

      <main class="mt-4 grid gap-4">
        <button
          v-for="item in restaurant.items"
          :key="item.id"
          type="button"
          @click="openItem(item)"
          class="group overflow-hidden rounded-2xl border border-slate-200 bg-white text-left shadow-soft transition hover:-translate-y-0.5 hover:shadow-xl focus:outline-none focus-visible:ring-2 focus-visible:ring-brand-500"
        >
          <div class="grid grid-cols-[110px_1fr] sm:grid-cols-[140px_1fr]">
            <img :src="item.image" :alt="item.name" class="h-full min-h-[110px] w-full object-cover" loading="lazy" />
            <div class="p-3 sm:p-4">
              <h2 class="text-base font-semibold sm:text-lg">{{ item.name }}</h2>
              <p class="mt-1 text-sm font-medium text-brand-600">{{ formatPrice(item.price) }}</p>
              <p class="mt-2 inline-flex items-center rounded-full bg-amber-50 px-2 py-1 text-xs font-semibold text-amber-700">
                ★ {{ item.rating.toFixed(1) }}
              </p>
              <p class="mt-2 text-sm text-slate-600">{{ item.description }}</p>
            </div>
          </div>
        </button>
      </main>

      <div
        v-if="activeItem"
        class="fixed inset-0 z-50 flex items-end justify-center bg-slate-900/50 p-3 sm:items-center"
        @click.self="activeItem = null"
      >
        <article class="w-full max-w-md overflow-hidden rounded-3xl bg-white shadow-2xl">
          <img :src="activeItem.image" :alt="activeItem.name" class="h-56 w-full object-cover" />
          <div class="space-y-2 p-5">
            <h2 class="text-2xl font-bold">{{ activeItem.name }}</h2>
            <p class="text-lg font-semibold text-brand-600">{{ formatPrice(activeItem.price) }}</p>
            <p class="text-sm font-medium text-amber-700">★ {{ activeItem.rating.toFixed(1) }}</p>
            <p class="text-sm leading-6 text-slate-600">{{ activeItem.description }}</p>
            <button
              type="button"
              @click="activeItem = null"
              class="mt-2 w-full rounded-xl bg-brand-600 px-4 py-3 font-semibold text-white transition hover:bg-brand-500"
            >
              Close
            </button>
          </div>
        </article>
      </div>
    </div>

    <script type="module" src="app.js"></script>
  </body>
</html>
